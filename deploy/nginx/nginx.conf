events {}

http {
    upstream dashboard_upstream {
        server dashboard:7000;
    }

    upstream control_upstream {
        server control-plane:8000;
    }

    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name _;

        # Replace with real certificates in deploy/nginx/certs.
        ssl_certificate /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_session_timeout 10m;
        ssl_protocols TLSv1.2 TLSv1.3;

        location /api/control/ {
            proxy_pass http://control_upstream/;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location / {
            proxy_pass http://dashboard_upstream/;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto https;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
